<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BestMCP Billing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f23; color: #e0e0e0; min-height: 100vh; padding: 2rem; }
        .container { max-width: 920px; margin: 0 auto; }
        h1 { color: #00d4ff; margin-bottom: 2rem; }
        .card { background: #1a1a2e; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #2a2a4e; }
        .card h2 { color: #00d4ff; margin-bottom: 1rem; font-size: 1.2rem; }
        .info-row { display: flex; justify-content: space-between; gap: 1rem; padding: 0.65rem 0; border-bottom: 1px solid #2a2a4e; align-items: center; }
        .info-row:last-child { border-bottom: none; }
        .label, .muted { color: #888; }
        .value { color: #fff; font-weight: 500; }
        .btn { background: #00d4ff; color: #0f0f23; border: none; padding: 0.75rem 1.1rem; border-radius: 8px; cursor: pointer; font-weight: 700; margin-top: 1rem; }
        .btn:hover { background: #00b8db; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .btn.secondary { background: #2a2a4e; color: #e0e0e0; margin-left: .5rem; }
        .loading { text-align: center; padding: 2rem; color: #888; }
        .error { color: #ff7777; padding: 1rem; background: #2a0a0a; border-radius: 8px; }
        .notice { color: #ffd166; padding: .8rem; background: #2b2307; border-radius: 8px; margin-top: .7rem; }
        code { color: #00d4ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BestMCP Billing Dashboard</h1>
        <div id="loading" class="loading">Loading...</div>
        <div id="content" style="display: none;">
            <div class="card">
                <h2>User Info</h2>
                <div class="info-row"><span class="label">Email</span><span class="value" id="email">-</span></div>
                <div class="info-row"><span class="label">Name</span><span class="value" id="name">-</span></div>
                <div class="info-row"><span class="label">Role</span><span class="value" id="role">-</span></div>
            </div>

            <div class="card">
                <h2>Credits</h2>
                <div class="info-row"><span class="label">Balance</span><span class="value" id="balance">-</span></div>
                <div class="info-row"><span class="label">Lifetime Used</span><span class="value" id="lifetime_used">-</span></div>
                <div class="info-row"><span class="label">Lifetime Purchased</span><span class="value" id="lifetime_purchased">-</span></div>
            </div>

            <div class="card">
                <h2>Subscription</h2>
                <div class="info-row"><span class="label">Status</span><span class="value" id="sub_status">-</span></div>
                <div class="info-row"><span class="label">Plan</span><span class="value" id="sub_plan">-</span></div>
                <button class="btn secondary" onclick="openBillingPortal()">Manage billing</button>
            </div>

            <div class="card">
                <h2>Plans</h2>
                <div id="plans" class="muted">Loading plans...</div>
            </div>

            <button class="btn" onclick="logout()">Logout</button>
        </div>
        <div id="error" style="display: none;"></div>
    </div>

    <script>
        function showError(target, message) {
            target.replaceChildren();
            const node = document.createElement('div');
            node.className = 'error';
            node.textContent = message;
            target.appendChild(node);
        }

        function createPlanRow(plan) {
            const row = document.createElement('div');
            row.className = 'info-row';

            const text = document.createElement('span');
            const title = document.createElement('strong');
            title.textContent = `${plan.product_name || plan.product_slug}: ${plan.name}`;
            const meta = document.createElement('span');
            meta.className = 'muted';
            const price = `$${(Number(plan.price_cents || 0) / 100).toFixed(2)}/${plan.billing_interval || plan.interval || 'month'}`;
            const credits = plan.credits_allocated || plan.credits_per_period || 0;
            meta.textContent = `${price} · ${credits} credits`;
            text.appendChild(title);
            text.appendChild(document.createElement('br'));
            text.appendChild(meta);

            const disabled = !plan.stripe_price_id || !String(plan.stripe_price_id).startsWith('price_');
            if (disabled) {
                const notice = document.createElement('div');
                notice.className = 'notice';
                notice.textContent = 'Stripe price is not configured yet.';
                text.appendChild(notice);
            }

            const button = document.createElement('button');
            button.className = 'btn';
            button.disabled = disabled;
            button.textContent = 'Buy';
            button.addEventListener('click', () => checkout(plan.id));

            row.appendChild(text);
            row.appendChild(button);
            return row;
        }

        async function loadSession() {
            try {
                const res = await fetch('/api/auth/session', { credentials: 'include' });
                if (!res.ok) {
                    if (res.status === 401) { window.location.href = '/api/auth/google'; return; }
                    throw new Error('Failed to load session');
                }
                const data = await res.json();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                if (data.user) {
                    document.getElementById('email').textContent = data.user.email || '-';
                    document.getElementById('name').textContent = data.user.name || '-';
                    document.getElementById('role').textContent = data.user.role || '-';
                }
                if (data.credits) {
                    document.getElementById('balance').textContent = data.credits.balance || 0;
                    document.getElementById('lifetime_used').textContent = data.credits.lifetime_used || 0;
                    document.getElementById('lifetime_purchased').textContent = data.credits.lifetime_purchased || 0;
                }
                if (data.subscription) {
                    document.getElementById('sub_status').textContent = data.subscription.status || 'inactive';
                    document.getElementById('sub_plan').textContent = data.subscription.plan_id || '-';
                }
                await loadPlans();
            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                showError(document.getElementById('error'), `Error: ${err.message}`);
            }
        }

        async function loadPlans() {
            const target = document.getElementById('plans');
            try {
                const res = await fetch('/api/billing/plans', { credentials: 'include' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to load plans');
                const plans = data.plans || [];
                if (!plans.length) { target.textContent = 'No paid plans are available yet.'; return; }
                target.replaceChildren(...plans.map(createPlanRow));
            } catch (err) {
                showError(target, err.message);
            }
        }

        async function checkout(planId) {
            const res = await fetch('/api/billing/checkout', {
                method: 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ plan_id: planId })
            });
            const data = await res.json();
            if (!res.ok) { alert(data.error || 'Checkout failed'); return; }
            if (data.url) window.location.href = data.url;
        }

        async function openBillingPortal() {
            const res = await fetch('/api/billing/portal', { method: 'POST', credentials: 'include' });
            const data = await res.json();
            if (!res.ok) { alert(data.error || 'No billing portal available yet'); return; }
            window.location.href = data.url;
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
            window.location.href = '/';
        }
        loadSession();
    </script>
</body>
</html>
